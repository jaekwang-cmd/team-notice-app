<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Team Notice</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-bg">
    <div class="titlebar">
      <span class="app-title">🗓️ Team Notice</span>
      <div class="window-controls">
        <button id="btn-settings" title="설정">⚙️</button>
        <button id="btn-minimize" title="최소화">—</button>
        <button id="btn-close" title="닫기">✕</button>
      </div>
    </div>

    <div id="config-banner" class="config-banner hidden">
      ⚠️ Firebase / Google 설정이 필요합니다. <code>config/config.json</code>을 채워주세요. (README 참고)
    </div>

    <div class="content">
      <section class="glass-card calendar-card">
        <div class="calendar-row">
          <div class="calendar-main">
            <div class="calendar-header">
              <button id="prev-month" class="nav-btn">‹</button>
              <h2 id="calendar-title">-</h2>
              <div class="header-right">
                <button id="sync-btn" class="nav-btn" title="구글 캘린더 새로고침">⟳</button>
                <button id="next-month" class="nav-btn">›</button>
              </div>
            </div>
            <div class="calendar-weekdays">
              <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <div class="google-status" id="google-status"></div>
          </div>

          <div id="day-panel" class="day-panel">
            <div class="day-panel-header">
              <h3 id="day-panel-title">날짜를 선택하세요</h3>
              <button id="day-panel-close" class="nav-btn">✕</button>
            </div>

            <div class="day-event-list" id="day-event-list">
              <div class="day-event-empty">날짜를 클릭하면 일정이 여기에 표시됩니다.</div>
            </div>

            <form id="event-form" class="event-form hidden">
              <input id="event-title" type="text" placeholder="일정 제목" maxlength="200" />
              <label class="toggle-row small">
                <span>하루 종일</span>
                <input type="checkbox" id="event-allday" checked />
              </label>
              <div class="event-time-row" id="event-time-row">
                <label>시작 <input type="time" id="event-start-time" value="09:00" /></label>
                <label>종료 <input type="time" id="event-end-time" value="10:00" /></label>
              </div>
              <div class="event-form-actions">
                <button type="submit" id="event-save">저장</button>
                <button type="button" id="event-share-team-btn" class="hidden">팀 공유로 추가</button>
                <button type="button" id="event-cancel">취소</button>
              </div>
            </form>

            <button id="event-add-btn" class="add-event-btn hidden">+ 일정 추가</button>
          </div>
        </div>
      </section>

      <section class="glass-card notice-card">
        <h3>📢 팀 공지</h3>
        <div class="notice-list" id="notice-list"></div>
        <div class="notice-input">
          <input id="notice-text" type="text" placeholder="공지를 입력하세요..." maxlength="500" />
          <button id="notice-send">보내기</button>
        </div>
      </section>
    </div>
  </div>

  <div id="settings-panel" class="settings-overlay hidden">
    <div class="glass-card settings-card">
      <h3>설정</h3>
      <label class="toggle-row">
        <span>Windows 시작 시 자동 실행</span>
        <input type="checkbox" id="autostart-toggle" />
      </label>

      <h3 class="theme-section-title">테마 (나만 보이는 개인 설정)</h3>

      <div class="theme-row">
        <span>전체 배경색</span>
        <input type="color" id="theme-bg" />
      </div>
      <div class="theme-row">
        <span>날짜 칸 배경색</span>
        <input type="color" id="theme-cell-bg" />
      </div>
      <div class="theme-row">
        <span>글씨 색상</span>
        <input type="color" id="theme-text" />
      </div>
      <div class="theme-row">
        <span>강조 색상</span>
        <input type="color" id="theme-accent" />
      </div>
      <div class="theme-row">
        <span>글씨체</span>
        <select id="theme-font">
          <option value="">기본</option>
          <option value="'맑은 고딕', sans-serif">맑은 고딕</option>
          <option value="'굴림', sans-serif">굴림</option>
          <option value="'돋움', sans-serif">돋움</option>
          <option value="'바탕', serif">바탕</option>
          <option value="'Consolas', monospace">Consolas</option>
        </select>
      </div>
      <div class="theme-row style-row">
        <span>카드 스타일</span>
      </div>
      <div class="style-options">
        <label><input type="radio" name="card-style" value="glass" /> 유리블록</label>
        <label><input type="radio" name="card-style" value="matte" /> 매트</label>
        <label><input type="radio" name="card-style" value="3d" /> 입체</label>
      </div>

      <button id="theme-reset" class="theme-reset-btn">기본값으로 초기화</button>

      <div id="admin-section" class="hidden">
        <h3 class="theme-section-title">관리자 관리</h3>
        <p class="field-label">기본 관리자: <span id="root-admin-list"></span></p>
        <textarea id="admin-emails-input" rows="3" placeholder="추가 관리자 이메일 (한 줄에 하나씩)"></textarea>
        <button id="admin-save-btn" class="theme-reset-btn">관리자 목록 저장</button>
      </div>

      <div class="settings-actions">
        <button id="settings-save">저장</button>
        <button id="settings-close">닫기</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
